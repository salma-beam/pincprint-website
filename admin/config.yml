backend:
  name: github
  repo: salma-beam/pincprint-website   # ← update this
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ─── SITE SETTINGS ───────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - label: "Business Info & SEO"
        name: "site"
        file: "/data/site.json"
        fields:
          - label: "Business Name"
            name: "business_name"
            widget: "string"
            hint: "Your trading name, e.g. PrintCo Durban"

          - label: "Short Tagline"
            name: "tagline"
            widget: "string"
            hint: "One sentence shown in the footer."

          - label: "Phone Number"
            name: "phone"
            widget: "string"
            hint: "Shown in nav, form and footer. e.g. 031 000 0000"

          - label: "WhatsApp Number (digits only, with country code)"
            name: "whatsapp"
            widget: "string"
            hint: "No spaces or +. e.g. 27312345678 for 031 234 5678"

          - label: "Email Address"
            name: "email"
            widget: "string"

          - label: "Physical Address"
            name: "address"
            widget: "string"
            hint: "e.g. 7 Garth Road, Mayville, Durban, 4001"

          - label: "Website URL"
            name: "site_url"
            widget: "string"
            hint: "Full URL with no trailing slash. e.g. https://www.yoursite.co.za"

          - label: "SEO Page Title"
            name: "seo_title"
            widget: "string"
            hint: "Shown in Google search results. Include your business name, city and key services. Keep under 60 characters."

          - label: "SEO Meta Description"
            name: "seo_description"
            widget: "text"
            hint: "Shown in Google search results below the title. 140–160 characters. Mention Durban and your top services."

          - label: "Social Share Image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Image shown when the page is shared on Facebook or WhatsApp. Ideal size: 1200×630px."

  # ─── SERVICES ────────────────────────────────────────────────────
  - name: "content"
    label: "Page Content"
    files:

      - label: "Services Section"
        name: "services"
        file: "/data/site.json"
        fields:
          - label: "Intro Text"
            name: "intro"
            widget: "string"
            hint: "Short line shown above the services grid."

          - label: "Services"
            name: "items"
            widget: "list"
            label_singular: "Service"
            summary: "{{fields.name}}"
            fields:
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Business Cards",       value: "card" }
                  - { label: "Flyer / Document",      value: "flyer" }
                  - { label: "Brochure / Tri-fold",   value: "brochure" }
                  - { label: "Banner / Large Format", value: "banner" }
                  - { label: "Sticker / Label",       value: "sticker" }
                  - { label: "Design / Pen",          value: "design" }
                  - { label: "Book / Booklet",        value: "book" }
                  - { label: "Promo / Branded Items", value: "promo" }

              - label: "Service Name"
                name: "name"
                widget: "string"
                hint: "e.g. Business Cards"

              - label: "Short Description"
                name: "desc"
                widget: "text"
                hint: "1–2 sentences. Shown on the service card."

      # ─── ABOUT ────────────────────────────────────────────────────
      - label: "About Section"
        name: "about"
        file: "data/about.json"
        fields:
          - label: "Heading"
            name: "headline"
            widget: "string"
            hint: "e.g. Your Local Print Partner in Durban"

          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            label_singular: "Paragraph"
            field: { label: "Text", name: text, widget: "text" }

          - label: "Stats"
            name: "stats"
            widget: "list"
            label_singular: "Stat"
            summary: "{{fields.label}}"
            hint: "Four numbers shown in the stats grid — e.g. years in business, clients served."
            fields:
              - { label: "Number / Value", name: "number", widget: "string", hint: "e.g. 10+ or 500+" }
              - { label: "Label",          name: "label",  widget: "string", hint: "e.g. Years in Business" }

      # ─── BENEFITS ─────────────────────────────────────────────────
      - label: "Why Choose Us Section"
        name: "benefits"
        file: "data/benefits.json"
        fields:
          - label: "Section Heading"
            name: "heading"
            widget: "string"
            hint: "e.g. The PrintCo Difference"

          - label: "Benefit Cards"
            name: "items"
            widget: "list"
            label_singular: "Benefit"
            summary: "{{fields.title}}"
            fields:
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Lightning bolt (Fast)",   value: "fast" }
                  - { label: "Star (Quality)",          value: "quality" }
                  - { label: "Coin (Price)",            value: "price" }
                  - { label: "Map pin (Local)",         value: "local" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }

      # ─── TESTIMONIALS ──────────────────────────────────────────────
      - label: "Client Testimonials"
        name: "testimonials"
        file: "data/testimonials.json"
        widget: "list"
        label_singular: "Testimonial"
        summary: "{{fields.name}} — {{fields.role}}"
        fields:
          - label: "Star Rating"
            name: "stars"
            widget: "select"
            options:
              - { label: "★★★★★  5 stars", value: 5 }
              - { label: "★★★★☆  4 stars", value: 4 }
              - { label: "★★★☆☆  3 stars", value: 3 }

          - label: "Review Text"
            name: "text"
            widget: "text"
            hint: "The client's words. 2–4 sentences works best."

          - label: "Client Name"
            name: "name"
            widget: "string"

          - label: "Client Role / Company"
            name: "role"
            widget: "string"
            hint: "e.g. Marketing Manager, Durban or Owner, Pinetown"